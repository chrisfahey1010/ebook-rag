services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ebook-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ebook_rag
      POSTGRES_USER: ebook_rag
      POSTGRES_PASSWORD: ebook_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebook_rag -d ebook_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

